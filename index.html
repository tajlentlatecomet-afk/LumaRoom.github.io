<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LumaRoom Voice</title>

<script src="peerjs.min.js"></script>

<style>

body{
background:#0F0F1F;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
gap:15px;
}

button{
padding:10px 18px;
font-size:16px;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
width:260px;
}

#roomId{
font-size:18px;
opacity:0.9;
}

#status{
opacity:0.7;
}

#users{
font-size:20px;
}

</style>
</head>

<body>

<h2>LumaRoom Voice</h2>

<button onclick="createRoom()">Create Room</button>

<input id="joinInput" placeholder="Enter room key">
<button onclick="joinRoom()">Join</button>

<div id="roomId"></div>

<div id="status">Status: idle</div>

<div id="users">Participants: 1</div>

<script>

let peer
let stream
let participants = 1

function updateUsers(){
document.getElementById("users").innerText =
"Participants: " + participants
}

function setStatus(text){
document.getElementById("status").innerText =
"Status: " + text
}

async function getMic(){
stream = await navigator.mediaDevices.getUserMedia({audio:true})
}

function generateKey(id){
return "LumaRoom-"+id.slice(0,4)+"-"+id.slice(4,8)
}

function extractPeer(key){
return key.replace("LumaRoom-","").replaceAll("-","")
}

async function createRoom(){

setStatus("requesting microphone")

await getMic()

setStatus("creating room")

peer = new Peer()

peer.on("open", id=>{

const key = generateKey(id)

document.getElementById("roomId").innerText =
"Room key: "+key

setStatus("waiting for friend")

})

peer.on("call", call=>{

participants++
updateUsers()

setStatus("friend connected")

call.answer(stream)

call.on("stream", remote=>{

const audio=new Audio()
audio.srcObject=remote
audio.play()

})

})

}

async function joinRoom(){

setStatus("requesting microphone")

await getMic()

const key=document.getElementById("joinInput").value
const id=extractPeer(key)

setStatus("connecting")

peer=new Peer()

peer.on("open", ()=>{

const call=peer.call(id,stream)

call.on("stream", remote=>{

participants++
updateUsers()

setStatus("connected")

const audio=new Audio()
audio.srcObject=remote
audio.play()

})

})

}

</script>

</body>
</html>
